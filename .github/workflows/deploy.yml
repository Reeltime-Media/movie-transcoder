name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # GHCR requires lowercase owner/name
  IMAGE: ghcr.io/reeltime-media/transcode-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q || [ $? -eq 5 ]

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        host_secret: [GCE_HOST_1, GCE_HOST_2, GCE_HOST_3]
    steps:
      - name: Resolve worker host
        id: host
        env:
          H1: ${{ secrets.GCE_HOST_1 }}
          H2: ${{ secrets.GCE_HOST_2 }}
          H3: ${{ secrets.GCE_HOST_3 }}
        run: |
          case "${{ matrix.host_secret }}" in
            GCE_HOST_1) HOST="$H1" ;;
            GCE_HOST_2) HOST="$H2" ;;
            GCE_HOST_3) HOST="$H3" ;;
          esac
          if [ -z "$HOST" ]; then
            echo "Skipping — secret ${{ matrix.host_secret }} not set"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "value=$HOST" >> "$GITHUB_OUTPUT"

      - name: Deploy to GCP worker over SSH
        if: steps.host.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.IMAGE }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ steps.host.outputs.value }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          envs: IMAGE,DEPLOY_DIR,GHCR_TOKEN,GHCR_USER
          script_stop: false
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            sudo mkdir -p "$DEPLOY_DIR"
            echo '' | base64 -d | sed "s|IMAGE_PLACEHOLDER|${IMAGE}:latest|" | sudo tee "$DEPLOY_DIR/docker-compose.yml" > /dev/null
            echo "---- compose ----"
            sudo cat "$DEPLOY_DIR/docker-compose.yml"
            sudo docker compose --project-directory "$DEPLOY_DIR" -f "$DEPLOY_DIR/docker-compose.yml" pull transcode
            sudo docker compose --project-directory "$DEPLOY_DIR" -f "$DEPLOY_DIR/docker-compose.yml" up -d transcode
            sudo docker image prune -f
